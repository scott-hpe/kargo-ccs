apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  annotations:
    kargo.akuity.io/color: green
  name: aquila-secondary
  namespace: kargo-ccs
spec:
  promotionTemplate:
    spec:
      vars:
        - name: cluster
          value: "aquila-${{ sharedConfigMap('cluster-region-state')[ctx.stage] }}"
      steps:
        - task:
            name: promote
  requestedFreight:
    - origin:
        kind: Warehouse
        name: ccs-guestbook
      sources:
        autoPromotionOptions:
          selectionPolicy: MatchUpstream
        requiredSoakTime: 60m0s
        stages:
          - aquila-primary