apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  annotations:
    kargo.akuity.io/color: amber
  name: mira-secondary
  namespace: kargo-ccs
spec:
  promotionTemplate:
    spec:
      vars:
        - name: cluster
          value: "mira-${{ sharedConfigMap('cluster-region-state')['mira-secondary'] }}"
      steps:
        - task:
            name: promote
  requestedFreight:
    - origin:
        kind: Warehouse
        name: ccs-guestbook
      sources:
        stages:
          - mira
