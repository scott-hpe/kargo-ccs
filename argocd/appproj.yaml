apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: kargo-ccs
  namespace: argocd
spec:
  clusterResourceWhitelist:
  - group: ""
    kind: Namespace
  destinations:
  - name: '*'
    namespace: ccs-guestbook-*
    server: '*'
  namespaceResourceWhitelist:
  - group: '*'
    kind: '*'
  sourceRepos:
  - https://github.com/scott-hpe/kargo-ccs.git
