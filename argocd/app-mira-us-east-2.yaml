apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    kargo.akuity.io/authorized-stage: kargo-ccs:mira-secondary
  labels:
    ccs-cluster: mira-us-east-2
  name: ccs-guestbook-mira-us-east-2
spec:
  destination:
    namespace: ccs-guestbook-mira-us-east-2
    server: https://kubernetes.default.svc
  project: kargo-ccs
  source:
    path: ./
    repoURL: https://github.com/scott-hpe/kargo-ccs.git
    targetRevision: env/mira-us-east-2
