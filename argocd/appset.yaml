apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: ccs-guestbook
  namespace: argocd
spec:
  generators:
  - git:
      repoURL: https://github.com/scott-hpe/kargo-ccs.git
      revision: HEAD
      directories:
      - path: env/*
  template:
    metadata:
      name: ccs-guestbook-{{path.basename}}
      labels:
        ccs-cluster: "{{path.basename}}"
      annotations:
        kargo.akuity.io/authorized-stage: kargo-ccs:{{path.basename}}
    spec:
      destination:
        namespace: ccs-guestbook-{{path.basename}}
        server: https://kubernetes.default.svc
      project: kargo-ccs
      source:
        path: ./
        repoURL: https://github.com/scott-hpe/kargo-ccs.git
        targetRevision: env/{{path.basename}}
